version: "3.9"

services:
  # ── FastAPI Backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mma-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ── React Frontend (Vite dev server) ─────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: mma-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules   # anonymous volume prevents host node_modules bleeding in
    ports:
      - "5173:5173"
    environment:
      # Use Docker service name so the browser JS can reach the backend inside Docker
      - VITE_API_BASE_URL=http://localhost:8000
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
