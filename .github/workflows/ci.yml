name: CI/CD Pipeline

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  # ── Frontend Build ─────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend (Node 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build (Vite)
        working-directory: ./frontend
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 3

  # ── Backend Check ──────────────────────────────────────────────────────────
  test-backend:
    name: Lint & Verify Backend (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install Dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Flake8 – Syntax & Undefined Names
        working-directory: ./backend
        run: |
          pip install flake8
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Flake8 – Style Warnings (non-blocking)
        working-directory: ./backend
        run: |
          flake8 app/ --count --exit-zero --max-line-length=120 --statistics

      - name: Import Verification
        working-directory: ./backend
        env:
          AWS_ACCESS_KEY_ID: "dummy"
          AWS_SECRET_ACCESS_KEY: "dummy"
          AWS_REGION: "us-east-1"
          S3_BUCKET_NAME: "ci-test-bucket"
        run: |
          python -W error -c "
          from app.config import get_settings
          from app.models.schemas import ChatRequest, ChatResponse, HealthResponse
          from app.main import create_app
          s = get_settings()
          print('Settings OK:', s.bedrock_chat_model_id, s.bedrock_max_tokens)
          app = create_app()
          print('App created OK, routes:', len(app.routes))
          "
